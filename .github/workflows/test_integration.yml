name: integration-tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: | 
          pip install python-llm-lucy
          pip install -r requirements.txt
      - run: |
          python python_llm/chat.py << 'EOF'
          I am bob.
          What is my name?
          EOF
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}